services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewace-postgres
    environment:
      POSTGRES_USER: interviewace
      POSTGRES_PASSWORD: acepassword
      POSTGRES_DB: interviewacedb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewace -d interviewacedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interviewace-net

  redis:
    image: redis:7-alpine
    container_name: interviewace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interviewace-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: interviewace-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewace-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: interviewace-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - interviewace-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewace-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/interviewacedb
      - SPRING_DATASOURCE_USERNAME=interviewace
      - SPRING_DATASOURCE_PASSWORD=acepassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - interviewace-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewace-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - interviewace-net

volumes:
  postgres_data:
  redis_data:

networks:
  interviewace-net:
    driver: bridge
