server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: interviewace-backend

  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/interviewacedb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Cache configuration
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka Messaging configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: interviewace-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Custom Security and AI Settings
app:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYW1pbmltdW0yNTZiaXRzZWNyZXRrZXlmb3Jqd3RzaWduaW5naW50ZXJ2aWV3YWNlYXBwbGljYXRpb24=}
    expiration-ms: 3600000 # 1 hour
    refresh-expiration-ms: 604800000 # 7 days
  openai:
    api-key: ${OPENAI_API_KEY:placeholder}
    model: gpt-4o-mini
